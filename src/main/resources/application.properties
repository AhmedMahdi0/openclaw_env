# Server configuration
server.port=8080
server.servlet.context-path=/

# Spring Boot configuration
spring.application.name=pet-paradise-store

# Thymeleaf configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Static resources
spring.web.resources.static-locations=classpath:/static/,classpath:/templates/

# Logging configuration
logging.level.com.example.openclaw=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Welcome message
welcome.message=Pet Paradise Store - Spring Boot Application is running!